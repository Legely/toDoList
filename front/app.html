<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои задачи | To-Do List</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="appBody">
    <header>
        <div class="logo">TO-DO<span>LIST</span></div>
        <div class="userControls">
            <span class="userName">Привет, <span id="userName">Имя пользователя</span></span>
            <button class="btnLogout" onclick="logout()">Выйти</button>
        </div>
    </header>
    <main class="boardContainer">
        <div class="boardColumn">
            <div class="columnHeader">
                <h3>К ВЫПОЛНЕНИЮ</h3>
                <span>13</span>
            </div>
            <div class="taskList">

            </div>

            <button class="btnAddTask">Добавить задачу</button>

        </div>

        <div class="boardColumn">
            <div class="columnHeader">
                <h3>К ВЫПОЛНЕНИЮ СЕГОДНЯ</h3>
                <span>12</span>
            </div>
        </div>

        <div class="boardColumn">
            <div class="columnHeader">
                <h3>В ПРОЦЕССЕ</h3>
                <span>2</span>
            </div>
        </div>

        <div class="boardColumn">
            <div class="columnHeader">
                <h3>ГОТОВО</h3>
                <span>5</span>
            </div>
        </div>



    </main>

    <script src="js/app.js"></script>
</body>

</html>

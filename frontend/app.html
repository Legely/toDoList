<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои задачи | To-Do List</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="appBody">
    <header>
        <div class="logo">TO-DO<span>LIST</span></div>
        <div class="userControls">
            <span class="userName">Привет, <span id="userName">Имя пользователя</span></span>
            <button class="btnLogout" onclick="logout()">Выйти</button>
        </div>
    </header>

    <main class="boardContainer">
        <div class="boardColumn">
            <div class="columnHeader">
                <h3>К ВЫПОЛНЕНИЮ</h3>
                <span>2</span>
            </div>

            <div class="taskList" id="taskListToDo">
                <div class="taskCard" onclick="toggleTask(this)">
                    <div class="taskHeader">
                        <span class="priority badgeHigh">High</span>
                    </div>
                    <h4 class="taskTitle">Настроить Spring Security</h4>
                    <p class="taskDesc">Добавить проверку JWT-токенов для всех эндпоинтов.</p>

                    <div class="taskFooter">
                        <span class="taskDate">16 Апр 2026</span>
                        <div class="taskActions">
                            <button type="button" class="iconBtn" title="Редактировать">✎</button>
                            <button type="button" class="iconBtn" title="Удалить">✖</button>
                            <button type="button" class="btnSmall moveBtn">В работу ➜</button>
                        </div>
                    </div>
                </div>

                <div class="taskCard" onclick="toggleTask(this)">
                    <div class="taskHeader">
                        <span class="priority badgeMed">Med</span>
                    </div>
                    <h4 class="taskTitle">Сверстать app.html</h4>
                    <p class="taskDesc">Сделать Канбан-доску в темных тонах.</p>

                    <div class="taskFooter">
                        <span class="taskDate">17 Апр 2026</span>
                        <div class="taskActions">
                            <button type="button" class="iconBtn">✎</button>
                            <button type="button" class="iconBtn">✖</button>
                            <button type="button" class="btnSmall moveBtn">В работу ➜</button>
                        </div>
                    </div>
                </div>
            </div>

            <button class="btnAddTask" onclick="openModal()">+ Добавить задачу</button>
        </div>

        <div class="boardColumn hidden">
            <div class="columnHeader">
                <h3>К ВЫПОЛНЕНИЮ СЕГОДНЯ</h3>
                <span>0</span>
            </div>
            <div class="taskList"></div>
        </div>

        <div class="boardColumn">
            <div class="columnHeader">
                <h3>В ПРОЦЕССЕ</h3>
                <span>0</span>
            </div>
            <div class="taskList" id="taskListInProgress"></div>
        </div>

        <div class="boardColumn">
            <div class="columnHeader">
                <h3>ГОТОВО</h3>
                <span>0</span>
            </div>
            <div class="taskList" id="taskListDone"></div>
        </div>
    </main>

    <div class="modalOverlay" id="taskModal">
        <div class="auth-container modalContent">
            <h2>Новая задача</h2>
            <form id="newTaskForm">
                <div class="input-group">
                    <label for="taskTitle">Название</label>
                    <input type="text" id="taskTitle" required>
                </div>
                <input type="hidden" id="editTaskId" value="">
                <div class="input-group">
                    <label for="taskDesc">Описание</label>
                    <textarea id="taskDesc" rows="3" required></textarea>
                </div>

                <div class="input-group">
                    <label for="taskPriority">Приоритет</label>
                    <select id="taskPriority" class="customSelect">
            <option value="LOW">Low (Низкий)</option>
            <option value="MEDIUM">Medium (Средний)</option>
            <option value="HIGH">High (Высокий)</option>
        </select>
                </div>

                <div class="input-group">
                    <label class="checkboxLabel">
            <input type="checkbox" id="hasDeadline" onchange="toggleDateInput()"> Установить срок выполнения?
        </label>
                </div>

                <div class="input-group" id="deadlineGroup" style="display: none;">
                    <label for="taskDate">Дата дедлайна</label>
                    <input type="date" id="taskDate">
                </div>

                <div class="modalActions">
                    <button type="button" class="btnOutline" onclick="closeModal()">Отмена</button>
                    <button type="submit">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
